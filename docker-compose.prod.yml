# Production overrides
services:
  api:
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # Override with your actual domain
      - FRONTEND_URL=http://e-aramaica.ru
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    restart: always
    logging:
      driver: "json-file" 
      options:
        max-size: "10m"
        max-file: "3"
    # Add SSL configuration in production
    # ports:
    #   - "80:80"
    #   - "443:443"
    # volumes:
    #   - ./ssl:/etc/nginx/ssl:ro
    #   - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro