services:
  # Node.js API server
  api:
    image: trpc-vue-example:api
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - FRONTEND_URL=http://localhost
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      # Use Node to check that HTTP responds; avoids needing nc/curl in the image
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - trpc-network

  # Nginx reverse proxy and static file server
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # Mount built client files from api container
      - client-files:/usr/share/nginx/html:ro
      # Mount nginx configuration
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Busybox wget is available in alpine; curl may not be
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trpc-network

  # Helper container to copy built client files
  client-files-init:
    image: trpc-vue-example:api
    depends_on:
      api:
        condition: service_started
    volumes:
      - client-files:/output
    command: sh -c "cp -r /app/dist/client/* /output/ 2> /dev/null || echo 'Client files copied'"
    networks:
      - trpc-network

volumes:
  client-files:

networks:
  trpc-network:
    driver: bridge
