services:
  # Node.js API server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - FRONTEND_URL=http://localhost
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - trpc-network

  # Nginx reverse proxy and static file server
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # Mount built client files from api container
      - client-files:/usr/share/nginx/html:ro
      # Mount nginx configuration
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trpc-network

  # Helper container to copy built client files
  client-files-init:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - client-files:/output
    command: sh -c "cp -r /app/dist/client/* /output/ 2>/dev/null || echo 'Client files copied'"
    networks:
      - trpc-network

volumes:
  client-files:

networks:
  trpc-network:
    driver: bridge